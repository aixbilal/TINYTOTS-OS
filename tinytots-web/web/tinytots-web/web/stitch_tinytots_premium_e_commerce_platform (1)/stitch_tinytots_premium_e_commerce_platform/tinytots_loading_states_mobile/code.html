<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TinyTots | Loading States</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-container": "#6b1e0d",
                        "secondary-container": "#cfe4e4",
                        "secondary-fixed": "#d2e6e7",
                        "on-error-container": "#93000a",
                        "surface": "#fcf9f8",
                        "primary-fixed": "#ffdad2",
                        "primary-fixed-dim": "#ffb4a3",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#374a4b",
                        "on-secondary-fixed": "#0b1e1f",
                        "on-primary-fixed-variant": "#7d2c19",
                        "surface-container": "#f0edec",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "background": "#fcf9f8",
                        "tertiary-container": "#b2a08e",
                        "tertiary-fixed-dim": "#d7c3b0",
                        "on-surface-variant": "#56423e",
                        "outline": "#89726d",
                        "on-surface": "#1b1c1b",
                        "inverse-primary": "#ffb4a3",
                        "inverse-on-surface": "#f3f0ef",
                        "secondary-fixed-dim": "#b6cacb",
                        "surface-container-highest": "#e4e2e1",
                        "surface-container-high": "#eae7e7",
                        "surface-tint": "#9c422e",
                        "surface-dim": "#dcd9d8",
                        "surface-container-low": "#f6f3f2",
                        "on-background": "#1b1c1b",
                        "secondary": "#4f6263",
                        "primary-container": "#f2846b",
                        "tertiary-fixed": "#f4dfcb",
                        "surface-bright": "#fcf9f8",
                        "primary": "#9c422e",
                        "on-primary-fixed": "#3d0600",
                        "inverse-surface": "#303030",
                        "on-tertiary-container": "#443729",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#241a0e",
                        "tertiary": "#6b5c4c",
                        "on-secondary-container": "#536667",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "outline-variant": "#dcc0bb",
                        "surface-variant": "#e4e2e1",
                        "on-tertiary-fixed-variant": "#524436",
                        "surface-container-lowest": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-desktop": "48px",
                        "container-max": "1200px",
                        "section-gap": "80px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "unit": "4px"
                    },
                    fontFamily: {
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "headline-md": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.05em", fontWeight: "600" }],
                        "title-lg": ["20px", { lineHeight: "28px", fontWeight: "600" }],
                        "label-sm": ["12px", { lineHeight: "16px", fontWeight: "500" }],

                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "headline-sm": ["24px", { lineHeight: "32px", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom Shimmer Animation using Design System Tokens */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .shimmer-effect {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right, var(--tw-colors-surface-container-high) 4%, var(--tw-colors-surface) 25%, var(--tw-colors-surface-container-high) 36%);
            background-size: 1000px 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col font-body-md text-body-md md:hidden relative">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-outline-variant/10 bg-surface/80 backdrop-blur-md text-primary flex justify-between items-center px-margin-mobile h-16">
<button aria-label="Menu" class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform">menu</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">TinyTots</h1>
<button aria-label="Shopping Bag" class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform">shopping_bag</button>
</header>
<!-- Main Scrollable Canvas -->
<main class="flex-1 pt-24 pb-28 px-margin-mobile flex flex-col gap-12">
<!-- Mobile Catalog Skeleton Section -->
<section class="flex flex-col gap-4">
<header class="mb-2">
<h2 class="font-title-lg text-title-lg text-primary">Catalog Loading State</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Vertical stack of single-column product cards</p>
</header>
<!-- Product Card Skeleton 1 -->
<article class="bg-on-tertiary rounded-xl p-4 shadow-[0_4px_20px_rgba(79,98,99,0.04)] flex flex-col gap-4">
<!-- Square Image Box -->
<div class="w-full aspect-square rounded-xl shimmer-effect"></div>
<!-- Text Placeholders -->
<div class="flex flex-col gap-2">
<div class="h-5 w-3/4 rounded-full shimmer-effect"></div>
<div class="h-4 w-1/3 rounded-full shimmer-effect mt-1"></div>
</div>
</article>
<!-- Product Card Skeleton 2 -->
<article class="bg-on-tertiary rounded-xl p-4 shadow-[0_4px_20px_rgba(79,98,99,0.04)] flex flex-col gap-4">
<!-- Square Image Box -->
<div class="w-full aspect-square rounded-xl shimmer-effect"></div>
<!-- Text Placeholders -->
<div class="flex flex-col gap-2">
<div class="h-5 w-4/5 rounded-full shimmer-effect"></div>
<div class="h-4 w-1/4 rounded-full shimmer-effect mt-1"></div>
</div>
</article>
</section>
<!-- Mobile PDP Skeleton Section -->
<section class="flex flex-col gap-4 mt-8">
<header class="mb-2">
<h2 class="font-title-lg text-title-lg text-primary">PDP Loading State</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Full-width hero with stacked content</p>
</header>
<!-- PDP Mockup Container -->
<article class="bg-on-tertiary rounded-xl shadow-[0_4px_20px_rgba(79,98,99,0.04)] overflow-hidden pb-8">
<!-- Full Width Hero Image Box -->
<div class="w-full aspect-[4/5] shimmer-effect"></div>
<!-- Content Area -->
<div class="px-margin-mobile mt-6 flex flex-col gap-5">
<!-- Title & Subtitle Group -->
<div class="flex flex-col gap-3">
<div class="h-8 w-2/3 rounded-full shimmer-effect"></div>
<div class="h-5 w-1/2 rounded-full shimmer-effect"></div>
</div>
<!-- Button Placeholder -->
<div class="h-12 w-full rounded-full shimmer-effect mt-2"></div>
<!-- Description Lines -->
<div class="flex flex-col gap-3 mt-4">
<div class="h-4 w-full rounded-full shimmer-effect"></div>
<div class="h-4 w-11/12 rounded-full shimmer-effect"></div>
<div class="h-4 w-4/5 rounded-full shimmer-effect"></div>
<div class="h-4 w-full rounded-full shimmer-effect"></div>
<div class="h-4 w-2/3 rounded-full shimmer-effect"></div>
</div>
</div>
</article>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe border-t border-outline-variant/10 bg-surface flex justify-around items-center h-20 px-4 font-label-md text-label-md">
<!-- Active Tab (Shop - mapping to Catalog/PDP intent) -->
<button class="flex flex-col items-center justify-center text-primary bg-primary-container/10 rounded-xl px-3 py-1 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">storefront</span>
<span>Shop</span>
</button>
<!-- Inactive Tabs -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined">favorite</span>
<span>Wishlist</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined">person</span>
<span>Account</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform">
<span class="material-symbols-outlined">shopping_cart</span>
<span>Cart</span>
</button>
</nav>
</body></html>
