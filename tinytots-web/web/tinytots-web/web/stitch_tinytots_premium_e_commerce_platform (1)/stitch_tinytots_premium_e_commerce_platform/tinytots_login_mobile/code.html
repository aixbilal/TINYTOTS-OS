</main>
<script>
        // Simple Segmented Control Logic
        function switchTab(tab) {
            const indicator = document.getElementById('segment-indicator');
            const buttons = indicator.parentElement.querySelectorAll('button');
            
            if(tab === 'login') {
                indicator.style.transform = 'translateX(0)';
                buttons[0].classList.replace('text-on-surface-variant', 'text-on-background');
                buttons[1].classList.replace('text-on-background', 'text-on-surface-variant');
            } else {
                indicator.style.transform = 'translateX(100%)';
                buttons[1].classList.replace('text-on-surface-variant', 'text-on-background');
                buttons[0].classList.replace('text-on-background', 'text-on-surface-variant');
            }
        }
    </script>
