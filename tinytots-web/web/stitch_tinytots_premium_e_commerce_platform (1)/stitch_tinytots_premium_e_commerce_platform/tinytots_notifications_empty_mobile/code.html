<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TinyTots - Notifications</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#56423e",
                        "primary-fixed-dim": "#ffb4a3",
                        "on-error-container": "#93000a",
                        "background": "#fcf9f8",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#ffdad2",
                        "surface-bright": "#fcf9f8",
                        "on-tertiary-fixed": "#241a0e",
                        "surface-container-low": "#f6f3f2",
                        "secondary-container": "#cfe4e4",
                        "surface": "#fcf9f8",
                        "on-secondary-fixed": "#0b1e1f",
                        "on-tertiary": "#ffffff",
                        "on-background": "#1b1c1b",
                        "inverse-surface": "#303030",
                        "on-tertiary-fixed-variant": "#524436",
                        "primary": "#9c422e",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-variant": "#e4e2e1",
                        "secondary-fixed": "#d2e6e7",
                        "outline-variant": "#dcc0bb",
                        "on-secondary-fixed-variant": "#374a4b",
                        "on-primary-container": "#6b1e0d",
                        "surface-container-highest": "#e4e2e1",
                        "outline": "#89726d",
                        "surface-tint": "#9c422e",
                        "surface-container": "#f0edec",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#eae7e7",
                        "surface-dim": "#dcd9d8",
                        "on-secondary": "#ffffff",
                        "primary-container": "#f2846b",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#d7c3b0",
                        "on-primary-fixed-variant": "#7d2c19",
                        "on-tertiary-container": "#443729",
                        "tertiary": "#6b5c4c",
                        "secondary": "#4f6263",
                        "on-primary-fixed": "#3d0600",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#f4dfcb",
                        "on-secondary-container": "#536667",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#b2a08e",
                        "secondary-fixed-dim": "#b6cacb",
                        "inverse-primary": "#ffb4a3",
                        "on-surface": "#1b1c1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1200px",
                        "margin-mobile": "16px",
                        "unit": "4px",
                        "section-gap": "80px",
                        "margin-desktop": "48px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "44px", "fontWeight": "700" }],
                        "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-sm": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background">
<div class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-container-max mx-auto">
<button aria-label="Menu" class="hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]" data-icon="menu">menu</span>
</button>
<h1 class="font-title-lg text-title-lg font-display-lg-mobile text-display-lg-mobile text-primary dark:text-primary-fixed-dim tracking-tight">TinyTots</h1>
<button aria-label="Shopping Bag" class="hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]" data-icon="shopping_bag">shopping_bag</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile pt-16 pb-24 relative overflow-hidden">
<!-- Ambient Decorative Blur Background -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-40">
<div class="w-64 h-64 bg-secondary-container rounded-full blur-3xl transform -translate-y-12"></div>
</div>
<div class="relative z-10 flex flex-col items-center text-center max-w-md w-full">
<!-- Minimalist Bell Icon Illustration -->
<div class="w-24 h-24 mb-8 rounded-full bg-surface-container-lowest shadow-[0px_4px_20px_rgba(79,98,99,0.04)] flex items-center justify-center relative">
<span class="material-symbols-outlined text-[40px] text-primary" data-icon="notifications" style="font-variation-settings: 'wght' 200;">notifications</span>
<!-- Decorative dot -->
<div class="absolute top-6 right-6 w-3 h-3 bg-primary-container rounded-full border-2 border-surface-container-lowest"></div>
</div>
<!-- Content -->
<h2 class="font-headline-md text-headline-md text-on-background mb-4">All Caught Up!</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-10 px-4">
                Your notification feed is currently empty. We'll let you know when there's an update on your orders or nursery plans.
            </p>
<!-- Action Button -->
<button class="bg-primary-container text-on-primary-container font-label-md text-label-md px-8 py-4 rounded-full shadow-[0px_4px_12px_rgba(242,132,107,0.2)] hover:opacity-90 active:scale-95 transition-all duration-200 w-full sm:w-auto flex items-center justify-center gap-2">
                Explore Inspiration
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container-lowest dark:bg-surface-container-low shadow-[0px_-4px_20px_rgba(79,98,99,0.04)] shadow-lg md:hidden">
<div class="flex justify-around items-center w-full py-3 px-4 pb-safe">
<!-- All items inactive as 'Notifications' is not in the primary navigation list -->
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-primary-container transition-colors active:scale-90 transition-transform w-16" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="storefront">storefront</span>
<span class="font-label-sm text-label-sm">Shop</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-primary-container transition-colors active:scale-90 transition-transform w-16" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="favorite">favorite</span>
<span class="font-label-sm text-label-sm">Wishlist</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-primary-container transition-colors active:scale-90 transition-transform w-16" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Account</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:text-primary-container transition-colors active:scale-90 transition-transform w-16" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="shopping_cart">shopping_cart</span>
<span class="font-label-sm text-label-sm">Cart</span>
</a>
</div>
</nav>
</body></html>
