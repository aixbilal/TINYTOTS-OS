<style>
        /* Custom toggle switch styling to match design tokens */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #9c422e; /* primary */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #9c422e; /* primary */
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
        .toggle-label {
            width: 44px;
            height: 24px;
            background-color: #e4e2e1; /* surface-variant */
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: #ffffff;
            border-radius: 50%;
            transition: transform 0.2s ease-in-out;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
    </style>

<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex">
<!-- Note: TopAppBar and Footer are suppressed due to the transactional nature of this screen (Sign-up flow), adhering to the Shell Visibility rules. -->
<!-- Left Column: Editorial Image (Hidden on Mobile) -->
<div class="hidden lg:block lg:w-1/2 relative bg-surface-variant overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center h-full w-full" data-alt="A highly detailed, serene lifestyle photograph of a softly lit, premium nursery space. A gentle parent is cradling a newborn baby in a comfortable, modern rocking chair. The lighting is warm and airy, casting soft shadows that emphasize a high-end boutique aesthetic. The color palette features creamy off-whites, subtle sage greens, and warm natural woods, reflecting a calm, luxurious, and aspirational mood." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCrVy8o-pK9K8s31G6vIi-einCUcfBTXs4eOFLrWFW0VbWbzg32i32Ot2kOyR5UF2Bsh0jbHJ-EvZHfvDRFEzvi02GSmXCMthKuYNuD_9TBMEIJTf5GG1gXWnQ00ByRGhOXM54hmXa45xfDEEqa7ikaj3MSp2YVxr3sr2_o6ZFKRFh40yw68uE0dgqfxyFF2XJwzuQQlWMArkKzJZ2fSl1M0Bd0oMEBm0ifH-p1QteZxJDi0Q2P7r3kMB72QkIml5IwE5-Z_maM1STB')">
</div>
<!-- Subtle brand overlay -->
<div class="absolute top-12 left-12">
<span class="font-display-md text-display-md text-on-primary drop-shadow-md tracking-tight">TinyTots</span>
</div>
</div>
<!-- Right Column: Registration Card -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-6 md:p-12 lg:p-24 overflow-y-auto">
<div class="w-full max-w-[480px]">
<!-- Mobile Brand Header (Visible only on mobile) -->
<div class="block lg:hidden mb-12 text-center">
<span class="font-display-md text-display-md text-primary tracking-tight">TinyTots</span>
</div>
<div class="mb-10">
<h1 class="font-display-md text-display-md text-on-background mb-3">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join our community for a curated, premium experience.</p>
</div>
<form class="space-y-6">
<!-- Name Row -->
<div class="flex flex-col sm:flex-row gap-6">
<div class="flex-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="firstName">First Name</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-on-background focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="firstName" name="firstName" placeholder="Jane" type="text"/>
</div>
<div class="flex-1 space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="lastName">Last Name</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-on-background focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="lastName" name="lastName" placeholder="Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="email">Email Address</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-on-background focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="jane.doe@example.com" type="email"/>
</div>
<!-- Mobile Number -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="mobile">Mobile Number</label>
<div class="flex rounded-lg border border-outline-variant bg-surface-container-lowest overflow-hidden focus-within:ring-1 focus-within:ring-primary focus-within:border-primary transition-colors">
<div class="flex items-center px-4 bg-surface-container border-r border-outline-variant">
<span class="font-body-md text-on-surface-variant mr-1">US</span>
<span class="font-body-md text-on-surface">+1</span>
</div>
<input class="w-full h-12 px-4 bg-transparent border-none font-body-md text-on-background focus:ring-0" id="mobile" name="mobile" placeholder="(555) 000-0000" type="tel"/>
</div>
</div>
<hr class="border-outline-variant my-8"/>
<!-- Preferences -->
<div class="space-y-6">
<!-- Toggle 1 -->
<div class="flex items-start justify-between gap-4">
<div class="flex flex-col">
<span class="font-body-md text-on-surface font-medium">Email Updates</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1">Send me style inspiration and exclusive offers via email.</span>
</div>
<div class="relative inline-block w-11 mt-1 align-middle select-none flex-shrink-0">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 opacity-0" id="toggleEmail" name="toggleEmail" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer" for="toggleEmail"></label>
</div>
</div>
<!-- Toggle 2 -->
<div class="flex items-start justify-between gap-4">
<div class="flex flex-col">
<span class="font-body-md text-on-surface font-medium">SMS Notifications</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1">Send me order updates and early sale access via SMS.</span>
</div>
<div class="relative inline-block w-11 mt-1 align-middle select-none flex-shrink-0">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 opacity-0" id="toggleSMS" name="toggleSMS" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer" for="toggleSMS"></label>
</div>
</div>
</div>
<!-- CTA -->
<div class="pt-6">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-button text-button rounded-lg hover:bg-primary hover:text-on-primary transition-colors flex items-center justify-center shadow-sm" type="button">
                        Create Account
                    </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors ml-1 underline decoration-primary/30 underline-offset-4" href="#">Log In</a>
</p>
</div>
</div>
</div>
</body></html>
