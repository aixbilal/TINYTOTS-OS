<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TinyTots - Account Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#004324",
                        "inverse-surface": "#303030",
                        "surface-tint": "#9c422e",
                        "background": "#fcf9f8",
                        "tertiary-fixed-dim": "#88d7a2",
                        "on-secondary-fixed": "#001e30",
                        "on-primary-fixed-variant": "#7d2c19",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#a2cbee",
                        "on-surface": "#1b1c1c",
                        "on-tertiary-fixed-variant": "#00522d",
                        "on-secondary-container": "#38617f",
                        "on-primary-container": "#6b1e0d",
                        "tertiary": "#186c40",
                        "surface-variant": "#e4e2e1",
                        "outline-variant": "#dcc0bb",
                        "on-tertiary-fixed": "#00210f",
                        "on-secondary-fixed-variant": "#1e4b67",
                        "surface-container-high": "#eae7e7",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f0eded",
                        "primary-fixed-dim": "#ffb4a3",
                        "primary": "#9c422e",
                        "on-primary-fixed": "#3d0600",
                        "tertiary-container": "#65b381",
                        "surface": "#fcf9f8",
                        "inverse-primary": "#ffb4a3",
                        "secondary-container": "#b2dcff",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0f0",
                        "secondary": "#396280",
                        "on-surface-variant": "#56423e",
                        "on-background": "#1b1c1c",
                        "surface-container-low": "#f6f3f2",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e2e1",
                        "surface-bright": "#fcf9f8",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#cae6ff",
                        "outline": "#89726d",
                        "primary-fixed": "#ffdad2",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#a3f4bd",
                        "surface-dim": "#dcd9d9",
                        "primary-container": "#f2846b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "stack-lg": "48px",
                        "gutter": "24px",
                        "bento-gap": "20px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "unit": "4px",
                        "container-max": "1280px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "display-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],

                    },
                    "fontSize": {

                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],

                        "button": ["16px", { "lineHeight": "1", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]

                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pt-16">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 backdrop-blur-md bg-background/80 dark:bg-background/80 border-b border-on-surface/5 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 transition-transform duration-200">
<button aria-label="Go back" class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity p-2 -ml-2" type="button">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-md text-display-md text-primary dark:text-primary-fixed-dim tracking-tight absolute left-1/2 transform -translate-x-1/2">
            TinyTots
        </h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile py-stack-md flex flex-col gap-stack-lg">
<!-- Header Section -->
<section class="text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Join TinyTots</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Create an account to start your journey.</p>
</section>
<!-- Registration Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Personal Details Bento -->
<div class="bg-surface-container-lowest rounded-xl p-gutter border border-on-surface/5 flex flex-col gap-stack-sm">
<h3 class="font-label-lg text-label-lg text-on-surface mb-2">Personal Details</h3>
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="firstName">First Name</label>
<input class="w-full h-12 bg-surface px-4 rounded-lg border border-on-surface/10 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/50" id="firstName" name="firstName" placeholder="Jane" required="" type="text"/>
</div>
<div class="flex-1 flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="lastName">Last Name</label>
<input class="w-full h-12 bg-surface px-4 rounded-lg border border-on-surface/10 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/50" id="lastName" name="lastName" placeholder="Doe" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<input class="w-full h-12 bg-surface px-4 rounded-lg border border-on-surface/10 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="jane.doe@example.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="phone">Phone Number</label>
<div class="flex relative">
<span class="absolute left-4 top-1/2 transform -translate-y-1/2 font-body-md text-body-md text-on-surface-variant select-none pointer-events-none">+92</span>
<input class="w-full h-12 bg-surface pl-14 pr-4 rounded-lg border border-on-surface/10 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/50" id="phone" name="phone" placeholder="300 1234567" type="tel"/>
</div>
</div>
</div>
<!-- Preferences Bento -->
<div class="bg-surface-container-lowest rounded-xl p-gutter border border-on-surface/5 flex flex-col gap-4">
<h3 class="font-label-lg text-label-lg text-on-surface">Preferences</h3>
<label class="flex items-center justify-between cursor-pointer group">
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Email Newsletter</span>
<div class="relative">
<input class="peer sr-only" type="checkbox"/>
<div class="block h-6 w-11 rounded-full bg-surface-variant border border-on-surface/10 peer-checked:bg-primary-container transition-colors"></div>
<div class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition-transform peer-checked:translate-x-5 shadow-sm"></div>
</div>
</label>
<hr class="border-on-surface/5"/>
<label class="flex items-center justify-between cursor-pointer group">
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">SMS Notifications</span>
<div class="relative">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="block h-6 w-11 rounded-full bg-surface-variant border border-on-surface/10 peer-checked:bg-primary-container transition-colors"></div>
<div class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition-transform peer-checked:translate-x-5 shadow-sm"></div>
</div>
</label>
</div>
<!-- Submission Section -->
<div class="flex flex-col gap-4 mt-stack-sm">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-button text-button rounded-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center" type="submit">
                    Complete Registration
                </button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-4">
                    Already have an account? <a class="text-primary font-medium hover:underline underline-offset-4" href="#">Log In</a>
</p>
</div>
</form>
</main>
<!-- BottomNavBar is automatically suppressed as this is a linear/transactional flow (Sign-up). -->
</body></html>
