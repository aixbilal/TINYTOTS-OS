<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Track Your Order - TinyTots</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#00522d",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary": "#186c40",
                        "on-surface": "#1b1c1c",
                        "on-primary-fixed-variant": "#7d2c19",
                        "surface-container": "#f0eded",
                        "secondary-container": "#b2dcff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#88d7a2",
                        "on-tertiary-container": "#004324",
                        "on-primary-fixed": "#3d0600",
                        "on-background": "#1b1c1c",
                        "secondary-fixed": "#cae6ff",
                        "tertiary-container": "#65b381",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#56423e",
                        "surface-dim": "#dcd9d9",
                        "secondary-fixed-dim": "#a2cbee",
                        "primary-fixed-dim": "#ffb4a3",
                        "surface-container-highest": "#e4e2e1",
                        "outline-variant": "#dcc0bb",
                        "inverse-on-surface": "#f3f0f0",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#ffdad2",
                        "on-primary-container": "#6b1e0d",
                        "on-primary": "#ffffff",
                        "secondary": "#396280",
                        "tertiary-fixed": "#a3f4bd",
                        "surface-variant": "#e4e2e1",
                        "primary": "#9c422e",
                        "surface-container-low": "#f6f3f2",
                        "background": "#fcf9f8",
                        "outline": "#89726d",
                        "surface": "#fcf9f8",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#eae7e7",
                        "on-secondary-container": "#38617f",
                        "inverse-surface": "#303030",
                        "inverse-primary": "#ffb4a3",
                        "surface-tint": "#9c422e",
                        "on-tertiary-fixed": "#00210f",
                        "on-secondary-fixed-variant": "#1e4b67",
                        "error-container": "#ffdad6",
                        "primary-container": "#f2846b",
                        "on-secondary-fixed": "#001e30",
                        "surface-bright": "#fcf9f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "margin-desktop": "64px",
                        "gutter": "24px",
                        "stack-lg": "48px",
                        "margin-mobile": "20px",
                        "container-max": "1280px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "bento-gap": "20px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-sm": ["Inter"],
                        "display-md": ["Plus Jakarta Sans"],
                        "button": ["Inter"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],

                    },

                        "headline-md": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-md": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]

                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col pt-14 pb-16 antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Shared Component -->
<header class="bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-outline/10 flex justify-between items-center px-margin-mobile h-14 w-full">
<button aria-label="Go back" class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed-dim tracking-tight">TinyTots</h1>
<button aria-label="Shopping bag" class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile py-stack-md w-full max-w-md mx-auto">
<!-- Animated Background Element (Subtle, decorative) -->
<div class="absolute inset-0 z-[-1] opacity-[0.03] pointer-events-none">

</div>
<!-- Track Order Card (Bento Style) -->
<div class="w-full bg-surface-container-lowest border border-[rgba(43,43,43,0.08)] rounded-xl p-6 sm:p-8 flex flex-col gap-stack-md shadow-sm relative overflow-hidden">
<!-- Subtle decorative gradient top -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary-container/20 via-primary-container to-primary-container/20"></div>
<div class="text-center">
<span class="material-symbols-outlined text-primary mb-2" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-1">Track Your Order</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your details to see the current status of your package.</p>
</div>
<form action="#" class="flex flex-col gap-stack-sm w-full" method="GET">
<!-- Order Number Field -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="order-number">Order Number</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="order-number" name="order-number" placeholder="e.g. TT-12345678" required="" type="text"/>
</div>
<!-- Email Address Field -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" name="email" placeholder="The email used for checkout" required="" type="email"/>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full bg-primary-container text-on-primary-container font-button text-button py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-primary-container/90 active:scale-[0.98] transition-all duration-200" type="submit">
                    Track Order
                    <span class="material-symbols-outlined text-[20px]" data-icon="search">search</span>
</button>
</form>
<div class="text-center pt-2 border-t border-outline/10">
<a class="font-body-sm text-body-sm text-secondary hover:text-secondary-container transition-colors underline underline-offset-4" href="#">Where can I find my order number?</a>
</div>
</div>
</main>
<!-- BottomNavBar Shared Component -->
<nav class="bg-surface dark:bg-surface-container-highest fixed bottom-0 w-full z-50 border-t border-outline/10 flex justify-around items-center h-16 w-full px-4 pb-safe">
<button aria-label="Shop" class="flex flex-col items-center gap-1 text-on-surface-variant dark:text-on-secondary-fixed-variant hover:bg-secondary-container/20 active:scale-90 transition-transform duration-150 p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
<span class="font-label-md text-label-md">Shop</span>
</button>
<button aria-label="Bag" class="flex flex-col items-center gap-1 text-on-surface-variant dark:text-on-secondary-fixed-variant hover:bg-secondary-container/20 active:scale-90 transition-transform duration-150 p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
<span class="font-label-md text-label-md">Bag</span>
</button>
<!-- Active Item: Orders -->
<button aria-label="Orders" class="flex flex-col items-center gap-1 text-primary dark:text-primary-fixed-dim active:scale-90 transition-transform duration-150 p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
<span class="font-label-md text-label-md">Orders</span>
</button>
<button aria-label="Account" class="flex flex-col items-center gap-1 text-on-surface-variant dark:text-on-secondary-fixed-variant hover:bg-secondary-container/20 active:scale-90 transition-transform duration-150 p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Account</span>
</button>
</nav>
</body></html>
