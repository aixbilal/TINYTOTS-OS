<!-- Bottom Nav (Suppressed for focused search overlay, but rendering base HTML per JSON requirement if it wasn't an overlay. Since it's a focused journey/task, it should be suppressed per rules. Adding it but hidden for compliance if needed, though instructions say to suppress). 
    Actually, rules say: "Automatic Suppression: You MUST exclude the navigation shell if the page intent is... Task-Focused: Any sub-page featuring a 'Close' or 'Back' action".
    I will NOT render the BottomNavBar to follow the strict suppression rule. -->
<script>
        // Simple script to handle clear button visibility
        const searchInput = document.querySelector('input[type="text"]');
        const clearBtn = document.getElementById('clearSearch');

        searchInput.addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            searchInput.focus();
        });
    </script>
