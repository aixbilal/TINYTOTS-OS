<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col md:flex-row">
<!-- Left Column: Editorial Image -->
<div class="hidden md:flex w-1/2 bg-surface-container-low relative overflow-hidden h-screen">
<div class="bg-cover bg-center w-full h-full absolute inset-0" data-alt="A warm, highly detailed lifestyle photography montage of happy, diverse children playing in premium, sustainable, soft-toned clothing. The aesthetic is modern editorial, high-key lighting, soft shadows, with a focus on high-quality textures like organic cotton and wool. The overall palette features ivory backgrounds, soft corals, and dusty blues, matching the premium juvenile brand identity. The image evokes a sense of trust, calm, and aspirational quality." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBXy-FURzP3yZy5-T2SztNTcKsew4Se1Xir3H1xuvrn5bO3WAwmrbP9bRCKZ7FiByZZqTSbJTq2TL8a1r0LXDi5srTg7ifeWOPjU8i3lajV4BvmMCi_PbjnXBlopEtwJrfTic60XTV6YtB_DgAEtTsFT7YJwZYAbo_tesNnLY-TWbvslQJseL5XyFXI9nqYuLkC0BPDnwVoX2YPrrnacBwIIyqOeli-av4_V-AvCoakFU55abgIjUn6gsohd7ANOXnAx122x2SSdDJj')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-surface/80 to-transparent flex items-end p-margin-desktop">
<div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight mb-stack-sm">TinyTots</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">Premium juvenile apparel crafted with love, sustainability, and uncompromising quality for the little moments that matter.</p>
</div>
</div>
</div>
<!-- Right Column: Auth Container -->
<div class="w-full md:w-1/2 flex items-center justify-center p-margin-mobile md:p-margin-desktop min-h-screen">
<div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline/20 rounded-[16px] p-stack-md md:p-stack-lg shadow-sm">
<!-- Mobile Brand Header (Visible only on mobile) -->
<div class="md:hidden text-center mb-stack-md">
<h1 class="font-display-md text-display-md text-primary tracking-tight">TinyTots</h1>
</div>
<!-- Segmented Control -->
<div class="flex p-unit bg-surface-container-low rounded-xl mb-stack-md border border-outline/10">
<button class="flex-1 py-3 text-center font-button text-button bg-surface-container-lowest text-on-surface rounded-lg shadow-sm transition-all" id="tab-login">
                    Log In
                </button>
<button class="flex-1 py-3 text-center font-button text-button text-on-surface-variant hover:text-on-surface transition-all rounded-lg" id="tab-create">
                    Create Account
                </button>
</div>
<div class="mb-stack-md text-center">
<h2 class="font-headline-lg text-headline-lg mb-unit">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your phone number to receive a verification code.</p>
</div>
<form class="space-y-stack-sm" id="auth-form">
<!-- Phone Input Matrix -->
<div class="space-y-unit">
<label class="font-label-md text-label-md text-on-surface-variant block">Phone Number</label>
<div class="flex border border-outline/20 rounded-lg overflow-hidden input-focus-blue bg-surface-container-lowest transition-colors group">
<!-- Country Code Select -->
<div class="flex items-center border-r border-outline/20 bg-surface-container-low/50 px-3">
<select class="bg-transparent font-body-md text-body-md text-on-surface border-none focus:ring-0 cursor-pointer appearance-none pr-6">
<option value="+92">+92 (PK)</option>
<option value="+1">+1 (US)</option>
<option value="+44">+44 (UK)</option>
</select>
<span class="material-symbols-outlined absolute ml-12 pointer-events-none text-on-surface-variant text-[20px]">expand_more</span>
</div>
<!-- Number Input -->
<input class="flex-1 border-none focus:ring-0 font-body-md text-body-md bg-transparent px-4 py-3 placeholder:text-on-surface-variant/50" placeholder="300 1234567" type="tel"/>
</div>
</div>
<!-- Alternative Email -->
<div class="space-y-unit pt-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant block flex justify-between">
<span>Email Address</span>
<span class="text-on-surface-variant/70 font-normal">Optional</span>
</label>
<div class="border border-outline/20 rounded-lg overflow-hidden input-focus-blue bg-surface-container-lowest transition-colors">
<input class="w-full border-none focus:ring-0 font-body-md text-body-md bg-transparent px-4 py-3 placeholder:text-on-surface-variant/50" placeholder="you@example.com" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-button text-button py-[14px] px-6 rounded-xl hover:opacity-90 transition-opacity mt-stack-md" id="send-code-btn" type="button">
                    Send Verification Code
                </button>
</form>
<!-- OTP Section (Initially Hidden) -->
<div class="hidden space-y-stack-sm mt-stack-md" id="otp-section">
<div class="text-center mb-stack-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant">Code sent to +92 300 1234567</p>
</div>
<div class="flex justify-center gap-3">
<input class="w-14 h-16 text-center font-headline-lg text-headline-lg border border-outline/20 rounded-lg input-focus-blue bg-surface-container-lowest focus:ring-0" maxlength="1" type="text"/>
<input class="w-14 h-16 text-center font-headline-lg text-headline-lg border border-outline/20 rounded-lg input-focus-blue bg-surface-container-lowest focus:ring-0" maxlength="1" type="text"/>
<input class="w-14 h-16 text-center font-headline-lg text-headline-lg border border-outline/20 rounded-lg input-focus-blue bg-surface-container-lowest focus:ring-0" maxlength="1" type="text"/>
<input class="w-14 h-16 text-center font-headline-lg text-headline-lg border border-outline/20 rounded-lg input-focus-blue bg-surface-container-lowest focus:ring-0" maxlength="1" type="text"/>
</div>
<div class="text-center mt-stack-sm">
<button class="font-body-sm text-body-sm text-primary hover:underline" id="resend-btn">
                        Resend code in <span id="timer">00:59</span>
</button>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-button text-button py-[14px] px-6 rounded-xl hover:opacity-90 transition-opacity mt-stack-md" type="button">
                    Verify &amp; Proceed
                </button>
</div>
<!-- Social Gateway Splitter -->
<div class="mt-stack-lg">
<div class="relative flex items-center mb-stack-sm">
<div class="flex-grow border-t border-outline/10"></div>
<span class="flex-shrink-0 px-4 font-label-md text-label-md text-on-surface-variant bg-surface-container-lowest">Or Connect Via</span>
<div class="flex-grow border-t border-outline/10"></div>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline/20 rounded-xl hover:bg-surface-container-low transition-colors bg-surface-container-lowest">
<!-- Simulated Google Icon -->
<span class="material-symbols-outlined text-[20px]">account_circle</span>
<span class="font-button text-button text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline/20 rounded-xl hover:bg-surface-container-low transition-colors bg-surface-container-lowest">
<!-- Simulated Apple Icon -->
<span class="material-symbols-outlined text-[20px]">apps</span>
<span class="font-button text-button text-on-surface">Apple</span>
</button>
</div>
</div>
</div>
</div>
<script>
        // Simple Interaction Script for OTP transition
        document.getElementById('send-code-btn').addEventListener('click', function() {
            document.getElementById('auth-form').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('hidden');
            
            // Simple timer
            let timeLeft = 59;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    document.getElementById('resend-btn').innerHTML = 'Resend Code Now';
                }
            }, 1000);
        });

        // Tab toggling visual
        document.getElementById('tab-create').addEventListener('click', function() {
            this.classList.replace('text-on-surface-variant', 'text-on-surface');
            this.classList.add('bg-surface-container-lowest', 'shadow-sm');
            
            const loginTab = document.getElementById('tab-login');
            loginTab.classList.replace('bg-surface-container-lowest', 'bg-transparent');
            loginTab.classList.replace('shadow-sm', 'hover:text-on-surface');
            loginTab.classList.replace('text-on-surface', 'text-on-surface-variant');
            
            document.querySelector('h2').textContent = 'Join TinyTots';
        });

        document.getElementById('tab-login').addEventListener('click', function() {
            this.classList.replace('text-on-surface-variant', 'text-on-surface');
            this.classList.replace('bg-transparent', 'bg-surface-container-lowest');
            this.classList.add('shadow-sm');
            
            const createTab = document.getElementById('tab-create');
            createTab.classList.replace('bg-surface-container-lowest', 'bg-transparent');
            createTab.classList.remove('shadow-sm');
            createTab.classList.replace('text-on-surface', 'text-on-surface-variant');
            
            document.querySelector('h2').textContent = 'Welcome back';
        });
    </script>
